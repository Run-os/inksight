[platformio]
; 构建目录移到纯 ASCII 路径，规避中文项目路径导致 GNU ld 写 firmware.map 失败的问题
build_dir = C:/Users/liuyz/inksight_pio_build
default_envs = epd_42_rlcd_s3_n16r8

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
extra_scripts = post:merge_firmware.py
; No external libraries needed: RLCD vendor driver (rlcd_bsp) + Arduino framework only.
; GxEPD2 / Adafruit_GFX / WebSockets (e-ink + voice chat) were removed with their panels.

# ── ESP32-S3-RLCD-4.2 反射式 LCD (ST7305) ─ 唯一目标板 ───────────────────
[env:epd_42_rlcd_s3_n16r8]
extends = common
board = esp32-s3-devkitc-1
upload_speed = 460800
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.partitions = partitions/inksight_16mb_ota.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_flags =
    -DBOARD_PROFILE_RLCD_S3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_RLCD
    -DALLOW_INSECURE_FALLBACK=0

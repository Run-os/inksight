[platformio]
; 构建目录移到纯 ASCII 路径，规避中文项目路径导致 GNU ld 写 firmware.map 失败的问题
build_dir = C:/Users/liuyz/inksight_pio_build
default_envs = epd_42_wsv2_ssd1683_c3_promini

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
board_build.extra_flags =
extra_scripts = post:merge_firmware.py
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.0
    links2004/WebSockets@^2.6.1

# ── 微雪v2 4.2" SSD1683 BW panels 软件模拟SPI驱动────────────────────────────────────
[env:epd_42_wsv2_ssd1683_c3_promini]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_c3_std]
extends = common
board = esp32-c3-devkitm-1
upload_speed = 460800
board_build.flash_mode = dio
board_build.f_flash = 40000000L
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_wroom32e]
extends = common
board = esp32dev
upload_speed = 460800
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_yd_s3_n16r8]
extends = common
board = esp32-s3-devkitc-1
upload_speed = 460800
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.partitions = partitions/inksight_16mb_ota.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_flags =
    -DBOARD_PROFILE_YD_ESP32_S3_N16R8
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

